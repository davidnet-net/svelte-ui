name: Package

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Manual Version Check (REQUIRES THE LATEST COMMIT IN THE PUSH TO BUMP VERSION! Otherwise it wont run)
        id: check
        shell: bash
        run: |
          NEW_VERSION=$(grep '"version":' package.json | cut -d'"' -f4)

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
              OLD_JSON=$(git show HEAD~1:package.json 2>/dev/null || echo "")
              if [ -n "$OLD_JSON" ]; then
              OLD_VERSION=$(echo "$OLD_JSON" | grep '"version":' | cut -d'"' -f4)
              else
              OLD_VERSION="0.0.0"
              fi
          else
              OLD_VERSION="0.0.0"
          fi

          echo "Old version: $OLD_VERSION"
          echo "New version: $NEW_VERSION"

          if [ "$NEW_VERSION" != "$OLD_VERSION" ] && [ -n "$NEW_VERSION" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
              echo "Version changed from $OLD_VERSION to $NEW_VERSION"
          else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "No version change detected."
          fi

      - name: Setup Bun
        if: steps.check.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install & Build
        if: steps.check.outputs.changed == 'true'
        run: |
          bun install --frozen-lockfile
          bun run build:package
        env:
          PUBLIC_BACKEND_URL: "provided_by_consumer"
          INTERNAL_SECRET: "provided_by_consumer"

      - name: Create GitHub Release
        if: steps.check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.version }}
          name: Release v${{ steps.check.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "@davidnet-net:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          bun publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
